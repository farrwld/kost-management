<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Manajemen Kamar Kos</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Daftar Kamar Kos-Kosan</h3>
            </div>
            <div class="card-body">
                <table class="table table-bordered table-striped mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>ID Kamar</th>
                            <th>No Kamar</th>
                            <th>Harga Sewa</th>
                            <th>Status</th>
                            <th>Fasilitas</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="kamar : ${daftarKamar}">
                            <td th:text="${kamar.idKamar}">1</td>
                            <td th:text="${kamar.noKamar}">A1</td>
                            <td th:text="'Rp ' + ${#numbers.formatDecimal(kamar.hargaSewa, 0, 'POINT', 0, 'COMMA')}">Rp
                                500.000</td>
                            <td>
                                <span th:text="${kamar.status}"
                                    th:classappend="${kamar.status == 'TERSEDIA'} ? 'badge bg-success' : 'badge bg-danger'">
                                    Status
                                </span>
                            </td>
                            <td th:text="${kamar.fasilitas}">Fasilitas Kamar</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(daftarKamar)}">
                            <td colspan="5" class="text-center text-muted">Belum ada data kamar di database.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
