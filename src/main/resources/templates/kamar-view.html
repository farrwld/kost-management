<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Manajemen Kamar</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css}" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-building-fill me-2"></i>Kost Management</a>
            <a href="/" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Kembali ke Dashboard</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3">
                <h4 class="mb-0"><i class="bi bi-door-open-fill me-2"></i>Manajemen Data Kamar</h4>
                <button class="btn btn-light btn-sm fw-semibold" data-bs-toggle="modal" data-bs-target="#modalKamar">
                    <i class="bi bi-plus-circle me-1"></i> Tambah Kamar Baru
                </button>
            </div>
            <div class="card-body p-4">
                <table class="table table-bordered table-striped align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID Kamar</th>
                            <th>Nomor Kamar</th>
                            <th>Tipe Kamar</th>
                            <th>Harga Bulanan</th>
                            <th>Status Kelayakan</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="kamar : ${daftarKamar}">
                            <td th:text="${kamar.idKamar}">1</td>
                            <td th:text="${kamar.noKamar}">A-01</td>
                            <td th:text="${kamar.fasilitas}">AC, Kasur</td>
                            <td th:text="'Rp ' + ${#numbers.formatDecimal(kamar.hargaSewa, 0, 'POINT', 0, 'COMMA')}">Rp
                                0</td>
                            <td>
                                <span th:text="${kamar.status}"
                                    th:classappend="${kamar.status == 'TERISI'} ? 'badge bg-danger' : 'badge bg-success'">
                                    Status
                                </span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(daftarKamar)}">
                            <td colspan="5" class="text-center text-muted py-3">Belum ada data kamar terdaftar.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalKamar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Form Tambah Kamar</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <form th:action="@{/kamar/tambah}" method="POST">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nomor Kamar</label>
                            <input type="text" name="nomorKamar" class="form-control" placeholder="Contoh: B-05"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Harga Sewa per Bulan (Rp)</label>
                            <input type="number" name="harga" class="form-control" min="0" placeholder="Contoh: 1500000"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Detail Fasilitas Kamar</label>
                            <input type="text" name="fasilitasKamar" class="form-control"
                                placeholder="Contoh: AC, Kasur, Kamar Mandi Dalam" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-primary px-4">Simpan Kamar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:src="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js}"></script>
</body>

</html>
