<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Daftar Keluhan & Maintenance</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css}" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-building-fill me-2"></i>Kost Management</a>
            <a href="/" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i> Kembali ke
                Dashboard</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card shadow border-0">
            <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center py-3">
                <h4 class="mb-0"><i class="bi bi-exclamation-triangle-fill me-2"></i>Daftar Laporan Keluhan Fasilitas
                </h4>

                <button th:if="${roleUser == 'PENGHUNI'}" class="btn btn-light btn-sm fw-semibold"
                    data-bs-toggle="modal" data-bs-target="#modalKeluhan">
                    <i class="bi bi-plus-circle me-1"></i> Buat Laporan Baru
                </button>
            </div>
            <div class="card-body p-4">
                <table class="table table-bordered table-striped align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th th:if="${roleUser == 'ADMIN'}">Pelapor (Username)</th>
                            <th>Tanggal Lapor</th>
                            <th>Deskripsi Kerusakan</th>
                            <th>Status</th>
                            <th th:if="${roleUser == 'ADMIN'}" class="text-center">Aksi Admin</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="keluhan : ${daftarKeluhan}">
                            <td th:text="${keluhan.idKeluhan}">1</td>
                            <td th:if="${roleUser == 'ADMIN'}" th:text="${keluhan.penghuni.username}">User</td>
                            <td th:text="${keluhan.tglKeluhan}">2026-06-21</td>
                            <td th:text="${keluhan.deskripsi}">Deskripsi</td>
                            <td>
                                <span th:text="${keluhan.statusPerbaikan}"
                                    th:classappend="${keluhan.statusPerbaikan == 'PENDING'} ? 'badge bg-secondary' : (${keluhan.statusPerbaikan == 'DIPROSES'} ? 'badge bg-warning text-dark' : 'badge bg-success')">
                                    Status
                                </span>
                            </td>
                            <td th:if="${roleUser == 'ADMIN'}" class="text-center">
                                <div class="d-inline-flex gap-2">
                                    <form th:if="${keluhan.statusPerbaikan == 'PENDING'}"
                                        th:action="@{/keluhan/status/{id}(id=${keluhan.idKeluhan})}" method="POST">
                                        <input type="hidden" name="statusBaru" value="DIPROSES">
                                        <button type="submit" class="btn btn-warning btn-sm fw-semibold text-dark"><i
                                                class="bi bi-gear-fill me-1"></i>Proses</button>
                                    </form>
                                    <form th:if="${keluhan.statusPerbaikan == 'DIPROSES'}"
                                        th:action="@{/keluhan/status/{id}(id=${keluhan.idKeluhan})}" method="POST">
                                        <input type="hidden" name="statusBaru" value="SELESAI">
                                        <button type="submit" class="btn btn-success btn-sm fw-semibold"><i
                                                class="bi bi-check-circle-fill me-1"></i>Selesai</button>
                                    </form>
                                    <span th:if="${keluhan.statusPerbaikan == 'SELESAI'}" class="text-muted small"><i
                                            class="bi bi-check2-all text-success"></i> Keluhan Teratasi</span>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(daftarKeluhan)}">
                            <td colspan="6" class="text-center text-muted py-3">Belum ada rekaman laporan keluhan
                                fasilitas.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalKeluhan" tabindex="-1" aria-hidden="true" th:if="${roleUser == 'PENGHUNI'}">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Form Laporan Kerusakan</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-submit="modal"
                        data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/keluhan/tambah}" method="POST">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label text-muted">Tanggal Laporan</label>
                            <input type="date" name="tglKeluhan" class="form-control" required
                                th:value="${#calendars.format(#calendars.createNow(), 'yyyy-MM-dd')}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted">Deskripsi Kerusakan Fasilitas</label>
                            <textarea name="deskripsi" class="form-control" rows="4"
                                placeholder="Contoh: Lampu kamar mandi mati atau AC bocor air..." required></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn btn-danger px-4">Kirim Laporan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:src="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js}"></script>
</body>

</html>
