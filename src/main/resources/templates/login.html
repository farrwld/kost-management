<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login - Kost Management</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
</head>

<body class="bg-dark d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow-lg border-0 rounded-3">
                    <div class="card-body p-5">
                        <h3 class="text-center fw-bold mb-4">Portal Login</h3>

                        <div th:if="${error}" class="alert alert-danger text-center py-2" th:text="${error}"></div>

                        <form th:action="@{/login}" method="POST">
                            <div class="mb-3">
                                <label class="form-label text-muted">Username</label>
                                <input type="text" name="username" class="form-control" placeholder="Masukan username disini"
                                    required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted">Password</label>
                                <input type="password" name="password" class="form-control" placeholder="***********"
                                    required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Masuk Ke
                                Sistem</button>
                        </form>

                        <div class="mt-4 text-center">
                            <small class="text-muted">Gunakan akun simulasi Tubes Kelompok 07</small>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
</body>

</html>
