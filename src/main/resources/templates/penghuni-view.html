<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Manajemen Penghuni Kos</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">Daftar Penghuni Kos</h3>
            </div>
            <div class="card-body">
                <table class="table table-bordered table-striped mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>ID User</th>
                            <th>Username</th>
                            <th>Role</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="penghuni : ${daftarPenghuni}">
                            <td th:text="${penghuni.idUser}">1</td>
                            <td th:text="${penghuni.username}">budi_kos</td>
                            <td><span class="badge bg-info text-dark" th:text="${penghuni.role}">PENGHUNI</span></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(daftarPenghuni)}">
                            <td colspan="3" class="text-center text-muted">Belum ada data penghuni kos.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
