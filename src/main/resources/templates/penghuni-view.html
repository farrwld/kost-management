<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Manajemen Penghuni</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css}" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-building-fill me-2"></i>Kost Management</a>
            <a href="/" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Kembali ke
                Dashboard</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card shadow border-0">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center py-3">
                <h4 class="mb-0"><i class="bi bi-people-fill me-2"></i>Manajemen Akun Penghuni</h4>
                <button class="btn btn-light btn-sm fw-semibold" data-bs-toggle="modal" data-bs-target="#modalPenghuni">
                    <i class="bi bi-person-plus-fill me-1"></i> Daftarkan Penghuni Baru
                </button>
            </div>
            <div class="card-body p-4">
                <table class="table table-bordered table-striped align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID User</th>
                            <th>Username</th>
                            <th>Password (Raw)</th>
                            <th>Hak Akses (Role)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${daftarPenghuni}">
                            <td th:text="${p.idUser}">1</td>
                            <td th:text="${p.username}">Faris</td>
                            <td th:text="${p.password}">pass123</td>
                            <td>
                                <span th:text="${p.role}"
                                    th:classappend="${p.role == 'ADMIN'} ? 'badge bg-dark' : 'badge bg-info text-dark'">
                                    Role
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPenghuni" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title"><i class="bi bi-person-plus-fill me-2"></i>Registrasi Penghuni Baru</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <form th:action="@{/penghuni/tambah}" method="POST">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control"
                                placeholder="Masukkan username bebas" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="text" name="password" class="form-control" placeholder="Masukkan password"
                                required>
                        </div>

                        <input type="hidden" name="role" value="PENGHUNI">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                        <button type="submit" class="btn bg-success text-white px-4">Simpan Akun</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:src="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js}"></script>
</body>

</html>
