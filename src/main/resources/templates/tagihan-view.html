<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Manajemen Tagihan Kos</title>
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css}" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-building-fill me-2"></i>Kost Management</a>
            <a href="/" class="btn btn-outline-light btn-sm">Kembali ke Dashboard</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow border-0">
            <div class="card-header bg-warning text-dark py-3">
                <h3 class="mb-0 fw-bold">Daftar Tagihan Bulanan Penghuni</h3>
            </div>
            <div class="card-body p-4">
                <table class="table table-bordered table-striped align-middle mt-2">
                    <thead class="table-dark">
                        <tr>
                            <th>ID Tagihan</th>
                            <th>Nama Penghuni</th>
                            <th>Periode</th>
                            <th>Jumlah Tagihan</th>
                            <th>Jatuh Tempo</th>
                            <th>Status Bayar</th>
                            <th class="text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tagihan : ${daftarTagihan}">
                            <td th:text="${tagihan.idTagihan}">1</td>
                            <td th:text="${tagihan.penghuni.username}">User</td>
                            <td th:text="${tagihan.periode}">Juni 2026</td>
                            <td
                                th:text="'Rp ' + ${#numbers.formatDecimal(tagihan.jumlahTagihan, 0, 'POINT', 0, 'COMMA')}">
                                Rp 0</td>
                            <td th:text="${tagihan.jatuhTempo}">2026-06-25</td>
                            <td>
                                <span th:text="${tagihan.statusBayar}"
                                    th:classappend="${tagihan.statusBayar == 'LUNAS'} ? 'badge bg-success' : 'badge bg-danger'">
                                    Status
                                </span>
                            </td>
                            <td class="text-center">
                                <div th:if="${tagihan != null}">
                                    <a th:if="${tagihan.statusBayar == 'LUNAS'}"
                                        th:href="@{/tagihan/cetak/{id}(id=${tagihan.idTagihan})}"
                                        class="btn btn-sm btn-outline-danger fw-semibold">
                                        <i class="bi bi-file-earmark-pdf-fill me-1"></i> Cetak Invoice
                                    </a>
                                    <span th:if="${tagihan.statusBayar != 'LUNAS'}" class="text-muted small">
                                        <i class="bi bi-clock-history me-1"></i> Menunggu Pembayaran
                                    </span>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(daftarTagihan)}">
                            <td colspan="7" class="text-center text-muted py-3">Belum ada data tagihan yang diterbitkan.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
